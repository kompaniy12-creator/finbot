name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.7.14

      - name: Format check
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Type check
        run: deno check supabase/functions/**/*.ts

      - name: Unit tests
        run: deno task test

      - name: Coverage report
        run: |
          rm -rf cov
          deno test --allow-all --coverage=cov tests/
          echo "=== Coverage summary ==="
          deno coverage cov --include="supabase/functions/" | tail -10
          deno coverage cov --include="supabase/functions/_shared/" | tail -10
