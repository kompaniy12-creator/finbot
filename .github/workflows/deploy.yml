name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    outputs:
      health_status: ${{ steps.health.outputs.status }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pinned (not "latest") so deploy doesn't depend on resolving the
          # newest release at runtime, which intermittently times out / rate
          # limits and fails the whole deploy.
          version: 2.107.0

      # NOTE: shared-org mode does NOT reset DB password, so we skip
      # `supabase link --password` and route all SQL through the Management
      # API query endpoint via scripts/apply_migration.sh.
      - name: Apply migrations via Management API
        run: |
          for f in supabase/migrations/*.sql; do
            bash scripts/apply_migration.sh "$f"
          done

      - name: Deploy functions
        run: |
          for fn in $(ls supabase/functions | grep -v '^_'); do
            supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt \
              --import-map deno.json
          done

      - name: Health check
        id: health
        run: |
          sleep 15
          STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" \
            "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/api-health-public")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Health check failed: HTTP $STATUS"
            cat /tmp/health.json || true
            exit 1
          fi
          echo "Health: $STATUS"

  auto-revert-on-failure:
    runs-on: ubuntu-latest
    needs: deploy-functions
    if: failure() && !contains(github.event.head_commit.message, '[no-auto-revert]')
    steps:
      - name: Checkout with history
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure git
        run: |
          git config user.name "FinBot CI"
          git config user.email "ci@finbot.local"

      - name: Revert last commit and mark
        run: |
          git revert --no-edit HEAD
          MSG="$(git log -1 --pretty=%B) [no-auto-revert]"
          git commit --amend -m "$MSG"
          git push origin main

  deploy-webapp:
    runs-on: ubuntu-latest
    needs: deploy-functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Mini App to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webapp
          publish_branch: gh-pages
          force_orphan: true
